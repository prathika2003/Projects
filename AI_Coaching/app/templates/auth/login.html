{% extends "shared/base.html" %}
{% block title %}Login | AI Career Coach{% endblock %}
{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in to continue your interview prep.</h1>
    </div>
    <form method="post" class="form-card validate-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Email
            <input type="email" name="email" required autocomplete="email">
        </label>
        <label>Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Login</button>
        <p class="muted">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    </form>
</section>
{% endblock %}
